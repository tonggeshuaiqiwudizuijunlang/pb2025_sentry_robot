/**:
  ros__parameters:
    debug: true                  # 是否开启调试模式（发布可视化 Marker）
    target_frame: odom
    max_armor_distance: 10.0     # 目标装甲板允许的最大距离（米）

    # ──────────────────────────────────────────────────────────────────────
    # 扩展卡尔曼滤波 (EKF) 参数 - 用于单装甲板跟踪
    # ──────────────────────────────────────────────────────────────────────
    ekf:
      sigma2_q_x: 0.80           # X轴位置过程噪声方差
      sigma2_q_y: 0.80           # Y轴位置过程噪声方差
      sigma2_q_z: 0.80           # Z轴位置过程噪声方差
      
      sigma2_q_yaw: 100.0        # 目标Yaw轴旋转过程噪声方差（越高表示允许其旋转越不规律）
      sigma2_q_r: 800.0          # 目标半径过程噪声方差
      sigma2_q_d_zc: 800.0       # 目标Z轴高度漂移过程噪声方差

      r_x: 5e-3                  # 视觉观测X轴方差（随距离动态放大）
      r_y: 5e-3                  # 视觉观测Y轴方差（随距离动态放大）
      r_z: 5e-3                  # 视觉观测Z轴方差（随距离动态放大）
      r_yaw: 1e-3                # 视觉观测Yaw轴方差

    # ──────────────────────────────────────────────────────────────────────
    # 跟踪器 (Tracker) 匹配参数
    # ──────────────────────────────────────────────────────────────────────
    tracker:
      max_match_distance: 0.5    # 帧间匹配允许的最大平移距离（米）
      max_match_yaw_diff: 1.0    # 帧间匹配允许的最大偏航角差（弧度）
      tracking_thres: 2          # 连续追踪所需的最少帧数（达标后才输出给云台）
      lost_time_thres: 1.0       # 目标丢失的最大容忍时间（秒），超过此时间则重置跟踪

    # ──────────────────────────────────────────────────────────────────────
    # 交互式多模型跟踪器 (IMM) - 用于精准预测小陀螺运动
    # ──────────────────────────────────────────────────────────────────────
    imm:
      enable: true               # 是否开启 IMM 跟踪（相比纯 EKF 对抗小陀螺性能更好）
      p_stay_cv:   0.90          # 维持在匀速(CV)模型的概率
      p_stay_ca:   0.85          # 维持在匀加速(CA)模型的概率
      p_stay_ctrv: 0.92          # 维持在匀速圆周运动(CTRV)模型的概率 (通常用于小陀螺)
      sage_husa_b0: 0.96         # Sage-Husa 自适应噪声遗忘因子 (0.92~0.98)
      ca_noise_factor: 5.0       # 匀加速模型的噪声放大系数，增加其灵活性

    # ──────────────────────────────────────────────────────────────────────
    # 四状态自瞄有限状态机 (FSM) - 移植自 wust_vision VeryAimer
    # 核心逻辑：根据目标的旋转速度(v_yaw)自动切换【单装甲板】、【切装甲板】、【中心瞄准】策略
    # 状态转换：SINGLE ──(>up)──► WHOLE_ARMOR ──(>up)──► WHOLE_PAIR ──(>up)──► CENTER
    # ──────────────────────────────────────────────────────────────────────
    aim_fsm:
      single_whole_up:   3.0     # rad/s - |v_yaw| 大于此时，开始追踪全身装甲板（应对慢速陀螺）
      single_whole_down: 2.0     # rad/s - |v_yaw| 小于此时，退回到单装甲板稳定跟踪
      whole_pair_up:     5.0     # rad/s - |v_yaw| 大于此时，进入对称双板切换（应对中速陀螺）
      whole_pair_down:   4.0     # rad/s - |v_yaw| 小于此时，退回全车装甲板追踪
      pair_center_up:    8.0     # rad/s - |v_yaw| 大于此时，直接瞄准车中心（应对高速陀螺）
      pair_center_down:  6.0     # rad/s - |v_yaw| 小于此时，退回对称双板切换
      transfer_thresh:   3       # 状态切换的防抖阈值：需连续 N 帧满足条件才真正切换状态

    # ──────────────────────────────────────────────────────────────────────
    # 解算器与火控核心参数 (Solver)
    # ──────────────────────────────────────────────────────────────────────
    solver:
      prediction_delay: 0.08     # 额外的预测提前量（秒），用于补偿发送与云台响应延迟
      controller_delay: 0.0      # 控制器延迟补偿
      yaw_prediction_scale: 0.6  # 偏航角(Yaw)预测缩放系数，用于解耦位置预测与姿态预测
      min_switching_v_yaw: 2.0   # rad/s - 当 |v_yaw| 低于此值时，不会触发切板逻辑（视为静止或平动）
      max_tracking_v_yaw: 60.0   # rad/s - [遗留单EKF阈值] |v_yaw| 极高时的中心后备阈值
      side_angle: 20.0           # deg   - [遗留单EKF阈值] 目标切换板的临界偏角
      bullet_speed: 24.0         # 射速 (m/s)

      # ── FSM 切板判定角度 (非常关键的抗抖动参数) ──
      coming_angle_deg:  60.0    # deg - 判定装甲板为“正朝向我们（迎面而来）”的可接受半角
      leaving_angle_deg: 45.0    # deg - 判定装甲板为“即将背对我们（离去）”的阈值，制造迟滞以防止在两块板之间抖动

      # ── 弹道补偿设置 ──
      compenstator_type: "ideal" # "ideal" (理想抛物线), "linear_drag" (带空气阻力分析) 等
      gravity: 9.80              # 重力加速度
      resistance: 0.08           # 空气阻力系数（仅针对非ideal模式有效）
      iteration_times: 20        # 弹道迭代逼近求解次数
      
      # ── 人工弹道补偿表 (映射：距离及高度 -> 枪管俯仰与偏航补偿) ──
      # 格式: "<最小距离>,<最大距离>,<最小高度差>,<最大高度差>,<Pitch加性补偿(deg)>,<Yaw加性补偿(deg)>"
      angle_offset: [
        "3.0 4.0 -1.0 1.2 -2.0 0.23",
        "4.0 5.0 -1.0 1.2 -2.0 0.24",
        "5.0 6.0 -1.0 0.4 -2.0 0.23",
        "5.0 6.0  0.4 0.8 -2.0 0.22", 
        "5.0 6.0  0.8 1.2 -2.0 0.22",
        "6.0 7.0 -1.0 0.4 -1.8 0.22",
        "6.0 7.0  0.4 0.8 -1.8 0.22",
        "6.0 7.0  0.8 1.2 -1.8 0.11",
        "7.0 8.0 -1.0 0.4 -1.8 0.11",
        "7.0 8.0  0.4 0.8 -1.8 0.11",
        "7.0 8.0  0.8 1.2 -1.8 0.11",
      ]

      # ────────────────────────────────────────────────────────────────
      # TinyMPC 云台轨迹平滑器 (防跟随机械振荡)
      # 开启后，将求解出的原始 Yaw/Pitch 进行再控制优化，避免输出尖峰加速度
      # ────────────────────────────────────────────────────────────────
      enable_mpc: false          # 开启 TinyMPC
      mpc_horizon:      20       # MPC 预测域（控制步数）
      mpc_dt:           0.004    # 内部控制的时间步长，需与 Node 定时器匹配 (例如 4ms -> 250Hz)
      mpc_q_pos:        5.0      # 位置追踪权重（设置较低以平缓突变）
      mpc_q_vel:        1.0      # 速度追踪权重
      mpc_r_acc:        150.0    # **加速度惩罚权重**（数值越大云台越平缓稳定，越不易抖动）
      mpc_rho:          1.0      # ADMM 迭代算法松弛惩罚参数
      mpc_max_acc_yaw:  30.0     # 物理限制的 Yaw 最大加速度 (rad/s^2)
      mpc_max_acc_pitch: 30.0    # 物理限制的 Pitch 最大加速度 (rad/s^2)
